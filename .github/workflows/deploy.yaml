name: Deploy to EC2

on: 
  push:
    branches:
      - main

jobs: 
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "server.js,package.json,package-lock.json,public/*"
          target: "/var/www/node-app/"

      - name: Setup and Start App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /var/www/node-app
            
            # Stop Apache to free port 80
            sudo systemctl stop httpd 2>/dev/null || true
            
            # Install dependencies
            rm -rf node_modules
            npm install --production
            
            # Stop old app
            pm2 delete node-app 2>/dev/null || true
            
            # Start app on port 80 (needs sudo)
            pm2 start server.js --name "node-app"
            pm2 save
            
            echo "✅ Deployed! Visit: http://${{ secrets.EC2_HOST }}"